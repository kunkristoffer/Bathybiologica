name: Story
description: Create a focused, deliverable piece of work within an epic
title: '[Story] '
body:
  - type: input
    id: summary
    attributes:
      label: Story summary
      description: A short description of the deliverable
      placeholder: Add server-side validation for contact form submissions
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should this story deliver when complete?
      placeholder: |
        The contact form should validate submitted data on the server and return
        clear error messages when the input is invalid.
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Which parts of the project does this story affect?
      multiple: true
      options:
        - Frontend
        - Backend
        - API
        - Database
        - Authentication
        - Infrastructure
        - CI/CD
        - CMS
        - Content
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this story?
      placeholder: |
        - Validate required fields on the server
        - Return field-specific errors
        - Prevent invalid submissions from being stored
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What conditions must be met before this story is done?
      placeholder: |
        - [ ] Invalid submissions are rejected on the server
        - [ ] Validation errors are returned in a usable format
        - [ ] Valid submissions continue through the normal flow
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation notes
      description: Technical notes, references, constraints, or related details
      placeholder: |
        Use the existing contact schema and action handler.
        Keep error formatting consistent with the current UI state shape.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Final checks before closing the story
      options:
        - label: I have checked that this feature is not a duplicate of existing work or an unfiled enhancement.
          required: true
        - label: The story is correctly linked to the parent epic and relevant roadmap labels and any required blocking issues or prerequisite tickets are linked/identified.
          required: false
        - label: All necessary user types (Public, Authenticated User, Admin) are covered in the scope description if applicable.
          required: false
        - label: The scope of this story is clearly contained within the parent Epic's goals (and not expanding them).
          required: false
        - label: Any required technical dependencies (e.g., new APIs or database fields) have been identified.
          required: false
