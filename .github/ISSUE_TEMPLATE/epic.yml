name: Epic
description: Create a parent issue that groups related stories around a larger outcome
title: "[Epic] "
labels:
  - epic
body:
  - type: input
    id: summary
    attributes:
      label: Epic summary
      description: A short description of the outcome or capability this epic represents
      placeholder: Build contact form workflow
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this epic is complete?
      placeholder: Describe the desired end result and why it matters.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem are we solving, or what opportunity are we pursuing?
      placeholder: Explain the context behind this epic.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: In scope
      description: What is included in this epic?
      placeholder: |
        - Item 1
        - Item 2
        - Item 3
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What is explicitly not part of this epic?
      placeholder: |
        - Item 1
        - Item 2
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What conditions must be met before this epic can be considered complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, mockups, technical notes, screenshots, or anything else relevant
    validations:
      required: false
