name: Story
description: Create a child issue under an epic for one actionable deliverable
title: "[Bug|Task|Feature]: Title"
body:
  - type: markdown
    attributes:
      value: |
        Use this template for a focused piece of work that belongs to an epic.
        A story should be small enough to complete clearly, but large enough to have its own acceptance criteria.

  - type: input
    id: summary
    attributes:
      label: Story summary
      description: A short name for the work being delivered
      placeholder: Add validation feedback to contact form
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: Parent epic
      description: Reference the parent epic issue number
      placeholder: #42
    validations:
      required: true

  - type: textarea
    id: story
    attributes:
      label: Story
      description: Describe the work as an outcome, not just an implementation step
      placeholder: |
        As a ...
        I want ...
        So that ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this story matter? What should the assignee understand before starting?
      placeholder: Add relevant background, constraints, or linked work.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this story?
      placeholder: |
        - Item 1
        - Item 2
        - Item 3
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What is not included in this story?
      placeholder: |
        - Item 1
        - Item 2
    validations:
      required: false

  - type: textarea
    id: blockers
    attributes:
      label: Dependencies / blockers
      description: List issues or PRs this story depends on, or work it blocks
      placeholder: |
        - Blocked by #123
        - Blocks #456
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What conditions must be met for this story to be complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should this be tested or reviewed?
      placeholder: |
        - Manual test steps
        - Expected behavior
        - Relevant test coverage
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, designs, screenshots, technical notes, or implementation references
    validations:
      required: false
